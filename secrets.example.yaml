# Secrets for NukiBlinker (#123).
#
# Copy to secrets.yaml. This file is git-ignored and is written by the web UI.
# Keeping secrets out of config.yaml means rewriting the config from the UI can
# never wipe a stored secret. Leave a value empty/omit it if you don't use it.

nuki:
  api_token: "your-nuki-bridge-api-token"
  # web_api_token: ""   # optional: Nuki Web API token to resolve real
  #                     # user names/triggers (cloud, read-only)

hue:
  api_key: "your-hue-bridge-api-key"
