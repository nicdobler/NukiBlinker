# NOTE: secrets (nuki.api_token, nuki.web_api_token, hue.api_key) are NOT stored
# here — they live in secrets.yaml (see secrets.example.yaml). The web UI writes
# them there, and an old config.yaml with inline secrets is migrated on next save.

nuki:
  bridge_ip: "192.168.1.100"
  bridge_port: 8080
  # opener_id: 12345              # optional: filter to a specific Opener (Bridge nukiId)
  # opener_name: "Front Door"     # optional: friendly name shown in the Event Log
  # opener_web_id: 9129696002     # optional: Nuki Web API smartlockId for the Opener (#190)
  # lock_id: 67890                # optional: filter to a specific Smart Lock (Bridge nukiId)
  # lock_name: "Flat Door"        # optional: friendly name shown in the Event Log
  # lock_web_id: 1234567890       # optional: Nuki Web API smartlockId for the Smart Lock (#190)

hue:
  bridge_ip: "192.168.1.101"
  lights: [1, 2, 3]               # light IDs to blink
  groups: []                       # or group IDs (e.g. [1] for "Living room")

speakers:
  chromecast: []                   # speaker names or IP addresses
  volume: 0.5                      # 0.0 - 1.0

homekit:
  enabled: false
  # setup_code: "123-45-678"      # auto-generated if empty
  # persist_dir: ".homekit"

events:
  ring:
    blink:
      mode: "long"                # "none", "short" (1 blink), or "long" (~15s)
    audio:
      enabled: false
    homekit: true

  ring_to_open:
    blink:
      mode: "short"               # single built-in Hue alert cycle
    audio:
      enabled: true
      mode: "tts"
      message: "{name} llegó a casa"
      fallback_name: "Alguien"
    homekit: true

  door_opened:
    blink:
      mode: "none"
    audio:
      enabled: true
      mode: "chime"               # plays the single fixed chime (sounds/chime.wav)
    homekit: false

server:
  host: "0.0.0.0"
  port: 8080
  public_host: ""                  # LAN IP for URLs (required in Docker, e.g. "192.168.86.50")

# Event timestamp validation - rejects events older than threshold
event_validation:
  enabled: true
  max_delay_seconds: 60            # Reject events older than 60 seconds

# Night mode - reduces notifications during specified hours
night_mode:
  enabled: false
  start_time: "22:00"              # 10 PM
  end_time: "07:00"                # 7 AM
  brightness_factor: 0.3           # 30% of normal brightness
  grace_minutes: 5                 # 5-minute buffer around boundaries

# Event logging - maintains event history for troubleshooting
event_log:
  enabled: true
  max_entries: 1000                # Maximum entries kept in the database
  retention_days: 7                # Keep entries for 7 days
  persist_to_file: true
  file_path: "logs/event_log.db"   # SQLite DB on the ./logs volume (a legacy .json path is auto-migrated)
  timezone: "Europe/Madrid"        # IANA tz for the CSV Date/Time columns

# Event deduplication - collapse the burst of callbacks one interaction emits
deduplication:
  enabled: false                   # disabled until event capture is confirmed correct
  window_seconds: 120              # suppress duplicate events within this window


# Application log file - rotating app log with basic weekly housekeeping
logging:
  file_path: "logs/nukiblinker.log"  # on the ./logs volume; empty disables file logging
  rotation_when: "W0"                # weekly (Monday); see TimedRotatingFileHandler `when`
  backup_count: 4                    # number of rotated files kept

# GitHub integration - used by the "Send support bundle" feature (#117).
# The token is a secret and lives in secrets.yaml (see secrets.example.yaml).
github:
  repo: "nicdobler/NukiBlinker"      # owner/repo target for support-bundle issues
  default_window_minutes: 15         # default +/- window around the reference point
