nuki:
  bridge_ip: "192.168.1.100"
  bridge_port: 8080
  api_token: "your-nuki-bridge-api-token"
  # opener_id: 12345              # optional: filter to a specific Opener
  # lock_id: 67890                # optional: filter to a specific Smart Lock

hue:
  bridge_ip: "192.168.1.101"
  api_key: "your-hue-bridge-api-key"
  lights: [1, 2, 3]               # light IDs to blink
  groups: []                       # or group IDs (e.g. [1] for "Living room")

speakers:
  chromecast: []                   # speaker names or IP addresses
  airplay: []                      # speaker names or IP addresses
  volume: 0.5                      # 0.0 - 1.0

homekit:
  enabled: false
  # setup_code: "123-45-678"      # auto-generated if empty
  # persist_dir: ".homekit"

events:
  ring:
    blink:
      mode: "alert"               # "alert", "custom", or "none"
    audio:
      enabled: false
    homekit: true

  ring_to_open:
    blink:
      mode: "custom"
      custom:
        hue: 25500                 # green
        saturation: 254
        brightness: 254
        flashes: 3
        interval_ms: 500
    audio:
      enabled: true
      mode: "tts"
      message: "{name} llegó a casa"
      fallback_name: "Alguien"
    homekit: true

  door_opened:
    blink:
      mode: "none"
    audio:
      enabled: true
      mode: "chime"
      chime: "chime.wav"
    homekit: false

server:
  host: "0.0.0.0"
  port: 8080
  public_host: ""                  # LAN IP for URLs (required in Docker, e.g. "192.168.86.50")
