name: Test & Report

on:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  issues: write

jobs:
  test-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run flake8 --show-source 2>&1 | tee lint-output.txt

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run pytest -rP 2>&1 | tee test-output.txt

      - name: Create issue on failure
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `## Automated Test Report\n\n`;
            body += `**Branch**: \`${branch}\`\n`;
            body += `**Commit**: \`${sha}\`\n`;
            body += `**Run**: [${context.runId}](${runUrl})\n\n`;

            const lintFailed = '${{ steps.lint.outcome }}' === 'failure';
            const testFailed = '${{ steps.test.outcome }}' === 'failure';

            if (lintFailed) {
              const output = fs.readFileSync('lint-output.txt', 'utf8').substring(0, 30000);
              body += `### ❌ Lint (flake8)\n\n\`\`\`\n${output}\n\`\`\`\n\n`;
            } else {
              body += `### ✅ Lint passed\n\n`;
            }

            if (testFailed) {
              const output = fs.readFileSync('test-output.txt', 'utf8').substring(0, 30000);
              body += `### ❌ Tests (pytest)\n\n\`\`\`\n${output}\n\`\`\`\n\n`;
            } else {
              body += `### ✅ Tests passed\n\n`;
            }

            body += `---\n*Auto-generated by \`test-report.yml\`*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Test failures on \`${branch}\` @ ${sha}`,
              body: body,
              labels: ['bug']
            });

      - name: Fail the workflow
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1
