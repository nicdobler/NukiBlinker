name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run flake8 --show-source 2>&1 | tee lint-output.txt

      - name: Upload lint output
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: lint-output
          path: lint-output.txt

      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run pytest -rP 2>&1 | tee test-output.txt

      - name: Upload test output
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-output
          path: test-output.txt

      - name: Fail if test failed
        if: steps.test.outcome == 'failure'
        run: exit 1

  report:
    needs: [lint, test]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download lint output
        uses: actions/download-artifact@v8
        with:
          name: lint-output
          path: .
        continue-on-error: true

      - name: Download test output
        uses: actions/download-artifact@v8
        with:
          name: test-output
          path: .
        continue-on-error: true

      - name: Report CI status
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const branch = context.payload.pull_request
              ? context.payload.pull_request.head.ref
              : context.ref.replace('refs/heads/', '');
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Stable marker so we keep ONE issue per branch instead of one per commit.
            const marker = `<!-- ci-report-branch:${branch} -->`;

            const lintFailed = '${{ needs.lint.result }}' === 'failure';
            const testFailed = '${{ needs.test.result }}' === 'failure';
            const failed = lintFailed || testFailed;

            // Find an existing open auto-generated issue for this branch.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug',
              per_page: 100,
            });
            const found = existing.find(i => i.body && i.body.includes(marker));

            // CI passed: close any open issue for this branch and stop.
            if (!failed) {
              if (found) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: found.number,
                  body: `✅ CI is green again on \`${branch}\` @ \`${sha}\` ([run](${runUrl})). Closing automatically.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: found.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
              }
              return;
            }

            // CI failed: build the report body.
            let body = `## Automated Test Report\n\n`;
            body += `**Branch**: \`${branch}\`\n`;
            body += `**Commit**: \`${sha}\`\n`;
            body += `**Run**: [${context.runId}](${runUrl})\n\n`;

            if (lintFailed) {
              try {
                const output = fs.readFileSync('lint-output.txt', 'utf8').substring(0, 30000);
                body += `### ❌ Lint (flake8)\n\n\`\`\`\n${output}\n\`\`\`\n\n`;
              } catch { body += `### ❌ Lint failed (see run log)\n\n`; }
            } else {
              body += `### ✅ Lint passed\n\n`;
            }

            if (testFailed) {
              try {
                const output = fs.readFileSync('test-output.txt', 'utf8').substring(0, 30000);
                body += `### ❌ Tests (pytest)\n\n\`\`\`\n${output}\n\`\`\`\n\n`;
              } catch { body += `### ❌ Tests failed (see run log)\n\n`; }
            } else {
              body += `### ✅ Tests passed\n\n`;
            }

            body += `---\n*Auto-generated by CI*\n${marker}`;

            // Update the existing branch issue if present, otherwise create one.
            if (found) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: found.number,
                title: `CI failing on \`${branch}\``,
                body: body,
                state: 'open',
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `CI failing on \`${branch}\``,
                body: body,
                labels: ['bug'],
              });
            }
