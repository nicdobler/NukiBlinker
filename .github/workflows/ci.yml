name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run flake8 --show-source 2>&1 | tee lint-output.txt

      - name: Upload lint output
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.txt

      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run pytest -rP 2>&1 | tee test-output.txt

      - name: Upload test output
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt

      - name: Fail if test failed
        if: steps.test.outcome == 'failure'
        run: exit 1

  report:
    needs: [lint, test]
    if: failure() && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download lint output
        uses: actions/download-artifact@v4
        with:
          name: lint-output
          path: .
        continue-on-error: true

      - name: Download test output
        uses: actions/download-artifact@v4
        with:
          name: test-output
          path: .
        continue-on-error: true

      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `## Automated Test Report\n\n`;
            body += `**Branch**: \`${branch}\`\n`;
            body += `**Commit**: \`${sha}\`\n`;
            body += `**Run**: [${context.runId}](${runUrl})\n\n`;

            const lintFailed = '${{ needs.lint.result }}' === 'failure';
            const testFailed = '${{ needs.test.result }}' === 'failure';

            if (lintFailed) {
              try {
                const output = fs.readFileSync('lint-output.txt', 'utf8').substring(0, 30000);
                body += `### ❌ Lint (flake8)\n\n\`\`\`\n${output}\n\`\`\`\n\n`;
              } catch { body += `### ❌ Lint failed (see run log)\n\n`; }
            } else {
              body += `### ✅ Lint passed\n\n`;
            }

            if (testFailed) {
              try {
                const output = fs.readFileSync('test-output.txt', 'utf8').substring(0, 30000);
                body += `### ❌ Tests (pytest)\n\n\`\`\`\n${output}\n\`\`\`\n\n`;
              } catch { body += `### ❌ Tests failed (see run log)\n\n`; }
            } else {
              body += `### ✅ Tests passed\n\n`;
            }

            body += `---\n*Auto-generated by CI*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Test failures on \`${branch}\` @ ${sha}`,
              body: body,
              labels: ['bug']
            });
