services:
  nukiblinker:
    image: ghcr.io/nicdobler/nukiblinker:latest
    container_name: nukiblinker
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./secrets.yaml:/app/secrets.yaml
      - ./homekit:/app/.homekit
      - ./logs:/app/logs
      # Persistent TTS cache (#178): generated mp3s survive container rebuilds so
      # repeated announcements replay instantly. Resolves to /app/cache/tts.
      - ./cache:/app/cache
      - /etc/localtime:/etc/localtime:ro
